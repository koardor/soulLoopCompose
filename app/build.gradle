plugins {
    id 'com.android.application'
}

android {
    namespace 'com.game.huanhuan'
    compileSdk 33

    defaultConfig {
        applicationId "com.game.huanhuan"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.3"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
        debug {
            applicationIdSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 打包所有assets
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    // 无需额外依赖，仅使用系统WebView
}
